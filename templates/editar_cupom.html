<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Cupom - Clube do Gole</title>

  <!-- CSS principal -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/editar_cupom.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Script principal -->
  <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/editar_cupom.js') }}" defer></script>
</head>

<body>
  {% include 'partials/header.html' %}

  <main class="cupons-container">
    <div class="container">
      <div class="cupons-header fade-in">
        <h1><i class="fas fa-edit"></i> Editar Cupom</h1>
        <p>Modifique as informações do cupom de desconto</p>
        <a href="{{ url_for('admin.cupons') }}" class="btn-voltar">
          <i class="fas fa-arrow-left"></i> Voltar para Cupons
        </a>
      </div>

      <div class="form-container fade-in">
        <form action="{{ url_for('admin.editar_cupom', cupom_id=cupom.id) }}" method="POST">
          <div class="form-group">
            <label for="codigoCupom">Código do Cupom:</label>
            <input type="text" id="codigoCupom" name="codigo" value="{{ cupom.codigo }}" required 
                   class="form-input">
          </div>

          <div class="form-group">
            <label for="descontoCupom">Desconto (%):</label>
            <input type="number" id="descontoCupom" name="desconto_percentual" 
                   value="{{ cupom.desconto_percentual }}" min="1" max="100" required
                   class="form-input">
          </div>

          <div class="form-group">
            <label for="usosCupom">Usos Máximos:</label>
            <input type="number" id="usosCupom" name="usos_maximos" 
                   value="{{ cupom.usos_maximos }}" min="1" required
                   class="form-input">
            <small>Usos restantes atuais: {{ cupom.usos_restantes }}</small>
          </div>

          <div class="form-group">
            <label for="statusCupom">Status:</label>
            <select id="statusCupom" name="status" required class="form-select">
              <option value="ativo" {% if cupom.status == 'ativo' %}selected{% endif %}>Ativo</option>
              <option value="inativo" {% if cupom.status == 'inativo' %}selected{% endif %}>Inativo</option>
            </select>
          </div>

          <div class="form-buttons">
            <a href="{{ url_for('admin.cupons') }}" class="btn-cancelar">
              <i class="fas fa-times"></i> Cancelar
            </a>
            <button type="submit" class="btn-salvar">
              <i class="fas fa-save"></i> Salvar Alterações
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  {% include 'partials/footer.html' %}
</body>
</html>
