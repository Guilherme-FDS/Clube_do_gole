<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Produto - Clube do Gole</title>

  <!-- CSS principal -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/editar_produto.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Script principal -->
  <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/editar_produto.js') }}" defer></script>
</head>

<body>
  {% include 'partials/header.html' %}

  <main class="admin-container">
    <div class="container">
      <div class="admin-header fade-in">
        <h1 class="titulo-lg"><i class="fas fa-edit"></i> Editar Produto</h1>
        <p class="texto-corrido">Altere os dados do produto e clique em salvar</p>
      </div>

      <div class="form-wrapper fade-in">
        <form action="{{ url_for('routes.editar_produto', id=produto.id) }}" method="POST" class="admin-form" enctype="multipart/form-data">
          <div class="form-group">
            <label for="nomeProduto" class="form-label">Nome do Produto:</label>
            <input type="text" id="nomeProduto" name="nome" value="{{ produto.nome }}" class="form-input" required>
          </div>

          <div class="form-group">
            <label for="tipoProduto" class="form-label">Tipo:</label>
            <select id="tipoProduto" name="tipo" class="form-select" required>
              <option value="Gold" {% if produto.tipo == 'Gold' %}selected{% endif %}>Gold</option>
              <option value="Premium" {% if produto.tipo == 'Premium' %}selected{% endif %}>Premium</option>
            </select>
          </div>

          <div class="form-group">
            <label for="descricaoProduto" class="form-label">Descrição:</label>
            <input type="text" id="descricaoProduto" name="descricao" value="{{ produto.descricao }}" class="form-input" required>
          </div>

          <div class="form-group">
            <label for="precoProduto" class="form-label">Preço:</label>
            <input type="number" id="precoProduto" name="preco" value="{{ produto.preco }}" step="0.01" min="0" class="form-input" required>
          </div>

          <div class="form-group">
            <label for="estoqueProduto" class="form-label">Estoque:</label>
            <input type="number" id="estoqueProduto" name="estoque" value="{{ produto.estoque }}" min="0" class="form-input" required>
          </div>

          <div class="form-group">
            <label for="imagemProduto" class="form-label">Imagem:</label>
            
            <!-- Campo URL (mantido para compatibilidade) -->
            <input type="url" id="imagemProdutoUrl" name="imagem" 
                   value="{{ produto.imagem if produto.imagem and not produto.imagem.startswith('data:image') else '' }}" 
                   class="form-input" placeholder="https://..." style="margin-bottom: 10px;">
            
            <!-- Campo para upload de arquivo -->
            <input type="file" id="imagemProdutoFile" name="imagem_file" accept="image/*" class="form-input" style="margin-bottom: 10px;">
            
            <!-- Preview da imagem -->
            {% if produto.imagem %}
              <img id="imagePreview" src="{{ produto.imagem }}" alt="Preview da imagem" class="image-preview">
            {% else %}
              <img id="imagePreview" src="#" alt="Preview da imagem" class="image-preview" style="display: none;">
            {% endif %}
            
            <!-- Campo hidden para Base64 -->
            <input type="hidden" id="imagemBase64" name="imagem_base64">
            
            <small class="form-help">Use o campo URL para links ou faça upload de uma imagem do seu computador</small>
          </div>

          <div class="form-buttons">
            <a href="{{ url_for('routes.produtos') }}" class="btn-admin btn-cancelar">Cancelar</a>
            <button type="submit" class="btn-admin btn-salvar">Salvar Alterações</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  {% include 'partials/footer.html' %}
</body>
</html>
